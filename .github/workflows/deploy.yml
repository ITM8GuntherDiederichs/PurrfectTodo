# ============================================================
# PurrfectTodo — Azure Deployment Workflow
# Triggers on push to main after CI passes.
# Deploys to the staging slot, runs a smoke-test, then swaps
# staging → production for zero-downtime deployment.
#
# Required repository secrets:
#   AZURE_CREDENTIALS      - JSON output of `az ad sp create-for-rbac`
#   AZURE_SUBSCRIPTION_ID  - Target Azure subscription
#   AZURE_RESOURCE_GROUP   - Target resource group name
#   APP_SERVICE_NAME       - Azure App Service name (e.g. app-purrfect-production)
# ============================================================
name: Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:            # allow manual trigger

concurrency:
  group: deploy-production
  cancel-in-progress: false    # never cancel an in-flight deployment

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'PurrfectTodo/PurrfectTodo.csproj'
  PUBLISH_DIR: '${{ github.workspace }}/publish'

jobs:
  # ──────────────────────────────────────────────────────────
  # 1. Build & publish
  # ──────────────────────────────────────────────────────────
  build:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build (Release)
        run: dotnet build ${{ env.PROJECT_PATH }} --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Publish
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --no-build \
            --configuration Release \
            --output ${{ env.PUBLISH_DIR }}

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: ${{ env.PUBLISH_DIR }}
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # 2. Deploy to staging slot → smoke-test → swap to production
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy → Staging → Swap
    runs-on: ubuntu-latest
    needs: build
    environment: production     # GitHub Environment gate (optional approvers)

    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp
          path: ${{ env.PUBLISH_DIR }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Deploy to the *staging* slot — production is untouched until swap
      - name: Deploy to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.APP_SERVICE_NAME }}
          slot-name: staging
          package: ${{ env.PUBLISH_DIR }}

      # Basic smoke-test: ensure the staging slot returns HTTP 200
      - name: Smoke-test staging slot
        run: |
          STAGING_URL="https://${{ secrets.APP_SERVICE_NAME }}-staging.azurewebsites.net"
          echo "Smoke-testing $STAGING_URL ..."
          for i in {1..5}; do
            STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "$STAGING_URL/")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 302 ]; then
              echo "✅ Staging slot healthy."
              exit 0
            fi
            sleep 15
          done
          echo "❌ Staging slot did not return 200/302 after 5 attempts. Aborting swap."
          exit 1

      # Swap staging → production (zero-downtime)
      - name: Swap staging → production
        run: |
          az webapp deployment slot swap \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.APP_SERVICE_NAME }} \
            --slot staging \
            --target-slot production \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify production health
        run: |
          PROD_URL="https://${{ secrets.APP_SERVICE_NAME }}.azurewebsites.net"
          echo "Verifying production at $PROD_URL ..."
          sleep 10
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "$PROD_URL/")
          echo "HTTP $STATUS"
          if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 302 ]; then
            echo "✅ Production is healthy after swap."
          else
            echo "⚠️  Production returned $STATUS — consider rolling back."
            exit 1
          fi

      - name: Azure Logout
        if: always()
        run: az logout
